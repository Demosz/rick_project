name: semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run Semgrep
        run: |
          uvx semgrep scan \
            --config auto \
            --config p/bandit \
            --error \
            --sarif --output=semgrep.sarif.json

      - name: Normalize security-severity for Code Scanning
        run: |
          jq '(.runs[].tool.driver.rules[]?.properties["security-severity"]) |=
              (if . == null then .
               elif (tonumber? != null) then .
               else (ascii_upcase) as $s |
                 if $s == "CRITICAL" then "9.5"
                 elif $s == "HIGH"    then "7.5"
                 elif $s == "MEDIUM"  then "5.5"
                 elif $s == "LOW"     then "3.5"
                 elif $s == "INFO" or $s == "WARNING" or $s == "ERROR" then "1.0"
                 else "1.0" end
               end)' \
            semgrep.sarif.json > semgrep.fixed.sarif.json
          mv semgrep.fixed.sarif.json semgrep.sarif.json

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: semgrep.sarif.json
